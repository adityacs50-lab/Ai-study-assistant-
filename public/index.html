<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant - Chat with PDFs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10a981;
            --primary-dark: #059669;
            --bg-dark: #0d0d0d;
            --bg-darker: #0a0a0a;
            --bg-card: #1a1a1a;
            --bg-hover: #2a2a2a;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --border: #404040;
            --error: #ff6b6b;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            background: var(--bg-darker);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-top {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-secondary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .history-item {
            padding: 12px 16px;
            margin: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 3px solid transparent;
        }

        .history-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-left-color: var(--primary);
        }

        .history-item.active {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-left-color: var(--primary);
        }

        .sidebar-bottom {
            padding: 12px 8px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .user-info:hover {
            background: var(--bg-hover);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .user-name {
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        /* ===== MAIN AREA ===== */
        .main-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .pdf-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pdf-status {
            display: none;
        }

        .pdf-status.active {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pdf-icon {
            font-size: 1.5rem;
        }

        .pdf-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .pdf-name {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .pdf-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-selector label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        #modelSelect {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        #modelSelect:hover {
            border-color: var(--primary);
        }

        #modelSelect:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(16, 169, 129, 0.1);
        }

        .upload-trigger {
            padding: 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s ease;
        }

        .upload-trigger:hover {
            color: var(--primary);
        }

        /* ===== CHAT AREA ===== */
        .chat-area {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 0;
            flex: 1;
            overflow: hidden;
        }

        .messages-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state-subtext {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: var(--primary);
            font-weight: bold;
        }

        .message.user .message-avatar {
            background: var(--bg-hover);
        }

        .message-bubble {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .message.assistant .message-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .message.user .message-bubble {
            background: var(--primary);
            color: white;
        }

        /* Markdown styling */
        .message.assistant .message-bubble p {
            margin: 6px 0;
        }

        .message.assistant .message-bubble strong {
            color: var(--primary);
        }

        .message.assistant .message-bubble h1,
        .message.assistant .message-bubble h2,
        .message.assistant .message-bubble h3 {
            color: var(--text-primary);
            margin: 10px 0 6px 0;
        }

        .message.assistant .message-bubble ol,
        .message.assistant .message-bubble ul {
            padding-left: 20px;
            margin: 8px 0;
        }

        .message.assistant .message-bubble li {
            margin: 4px 0;
        }

        .message.assistant .message-bubble code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .message.assistant .message-bubble pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        /* ===== SIDEBAR RIGHT (HISTORY) ===== */
        .history-sidebar {
            background: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .history-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-counter {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .history-list-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .history-list-item:hover {
            background: rgba(16, 169, 129, 0.1);
            border-left-color: var(--primary);
        }

        .history-question {
            font-size: 0.85rem;
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .history-empty {
            padding: 20px 12px;
            text-align: center;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            font-size: 0.9rem;
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 100%;
        }

        #questionInput {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            resize: none;
            max-height: 100px;
            transition: all 0.2s ease;
        }

        #questionInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(16, 169, 129, 0.1);
        }

        #questionInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-button:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .send-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-message {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Error message */
        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border-left: 4px solid var(--error);
            color: #ff9999;
            padding: 12px 16px;
            border-radius: 6px;
            display: none;
            margin-bottom: 12px;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        /* File input */
        #fileInput {
            display: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Mobile responsive */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .chat-area {
                grid-template-columns: 1fr;
            }

            .history-sidebar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .top-bar-left,
            .top-bar-right {
                width: 100%;
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- LEFT SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-top">
                <button class="new-chat-btn" id="newChatBtn">
                    <span>+ New Chat</span>
                </button>
            </div>

            <div class="sidebar-content" id="sidebarHistory">
                <div style="padding: 20px 16px; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                    No conversations yet
                </div>
            </div>

            <div class="sidebar-bottom">
                <div class="user-info">
                    <div class="user-avatar">📚</div>
                    <div class="user-name">Study Assistant</div>
                </div>
            </div>
        </div>

        <!-- MAIN AREA -->
        <div class="main-area">
            <!-- TOP BAR -->
            <div class="top-bar">
                <div class="top-bar-left">
                    <div class="pdf-info">
                        <div class="pdf-status" id="pdfStatus">
                            <div class="pdf-icon">📄</div>
                            <div class="pdf-details">
                                <div class="pdf-name" id="pdfName"></div>
                                <div class="pdf-meta">
                                    <span id="pdfPages"></span> • <span id="pdfSize"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="top-bar-right">
                    <div class="model-selector">
                        <label for="modelSelect">AI Model:</label>
                        <select id="modelSelect">
                            <option value="claude-opus-4-1">Opus 4.1 (Best)</option>
                            <option value="claude-sonnet-4-20250514">Sonnet 4 (Fast)</option>
                            <option value="claude-3-5-sonnet-20241022">Sonnet 3.5 (Balanced)</option>
                        </select>
                    </div>
                    <button class="upload-trigger" id="uploadTrigger" title="Upload PDF">📤</button>
                </div>
            </div>

            <!-- CHAT AREA -->
            <div class="chat-area">
                <!-- MESSAGES -->
                <div class="messages-container">
                    <div class="error-message" id="errorMessage"></div>

                    <div id="messagesWrapper">
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <div class="empty-state-text">AI Study Assistant</div>
                            <div class="empty-state-subtext">Upload a PDF to start asking questions</div>
                        </div>
                    </div>
                </div>

                <!-- HISTORY SIDEBAR -->
                <div class="history-sidebar">
                    <div class="history-header">
                        CHAT HISTORY
                        <span class="history-counter" id="historyCounter">0</span>
                    </div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty">No Q&A yet</div>
                    </div>
                </div>
            </div>

            <!-- INPUT AREA -->
            <div class="input-area">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="questionInput"
                        placeholder="Ask a question about your PDF..."
                        disabled
                    />
                    <button class="send-button" id="sendButton" disabled>
                        Send
                    </button>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".pdf" />
    </div>

    <script>
        // State
        let currentSessionId = null;
        let isLoading = false;
        let chatHistoryData = [];
        let conversations = [];

        const elements = {
            fileInput: document.getElementById('fileInput'),
            uploadTrigger: document.getElementById('uploadTrigger'),
            pdfStatus: document.getElementById('pdfStatus'),
            pdfName: document.getElementById('pdfName'),
            pdfPages: document.getElementById('pdfPages'),
            pdfSize: document.getElementById('pdfSize'),
            messagesWrapper: document.getElementById('messagesWrapper'),
            questionInput: document.getElementById('questionInput'),
            sendButton: document.getElementById('sendButton'),
            errorMessage: document.getElementById('errorMessage'),
            modelSelect: document.getElementById('modelSelect'),
            historyList: document.getElementById('historyList'),
            historyCounter: document.getElementById('historyCounter'),
            newChatBtn: document.getElementById('newChatBtn'),
        };

        // Upload handlers
        elements.uploadTrigger.addEventListener('click', () => elements.fileInput.click());
        elements.fileInput.addEventListener('change', handleFileSelect);

        async function handleFileSelect() {
            const file = elements.fileInput.files[0];
            if (!file) return;

            if (file.type !== 'application/pdf') {
                showError('Please upload a valid PDF file');
                return;
            }

            const formData = new FormData();
            formData.append('pdf', file);

            try {
                showError('');
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                currentSessionId = data.sessionId;

                // Store conversation
                conversations.push({
                    id: data.sessionId,
                    filename: data.filename,
                    timestamp: new Date(),
                    history: []
                });

                // Update UI
                elements.pdfName.textContent = data.filename;
                elements.pdfPages.textContent = `${data.pages} pages`;
                elements.pdfSize.textContent = `${(data.textLength / 1024 / 1024).toFixed(1)} MB`;
                elements.pdfStatus.classList.add('active');

                elements.questionInput.disabled = false;
                elements.sendButton.disabled = false;

                // Reset chat
                chatHistoryData = [];
                elements.historyList.innerHTML = '<div class="history-empty">No Q&A yet</div>';
                elements.historyCounter.textContent = '0';

                // Update messages
                elements.messagesWrapper.innerHTML = `
                    <div class="messages">
                        <div class="message assistant">
                            <div class="message-avatar">AI</div>
                            <div class="message-bubble">
                                👋 Ready to help! Ask me anything about <strong>"${data.filename}"</strong>
                            </div>
                        </div>
                    </div>
                `;

                // Add to sidebar
                addConversationToSidebar(data.sessionId, data.filename);

                elements.questionInput.focus();
            } catch (error) {
                showError(`Upload failed: ${error.message}`);
                console.error('Upload error:', error);
            }
        }

        // Question handling
        elements.sendButton.addEventListener('click', sendQuestion);
        elements.questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading && currentSessionId) {
                sendQuestion();
            }
        });

        async function sendQuestion() {
            const question = elements.questionInput.value.trim();
            if (!question || isLoading || !currentSessionId) return;

            try {
                showError('');
                isLoading = true;
                elements.sendButton.disabled = true;
                elements.questionInput.disabled = true;

                addMessage('user', question);
                elements.questionInput.value = '';

                addMessage('assistant', '<div class="loading-message"><span>Thinking</span><span class="spinner"></span></div>');

                const selectedModel = elements.modelSelect.value;
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId, question, model: selectedModel })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to get response');
                }

                removeLastMessage();
                addMessage('assistant', data.answer);
                updateHistory(question, data.answer);
            } catch (error) {
                showError(`Error: ${error.message}`);
                removeLastMessage();
                console.error('Question error:', error);
            } finally {
                isLoading = false;
                elements.sendButton.disabled = false;
                elements.questionInput.disabled = false;
                elements.questionInput.focus();
            }
        }

        function addMessage(role, content) {
            const messagesDiv = getOrCreateMessagesDiv();

            const message = document.createElement('div');
            message.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            if (role === 'assistant' && !content.includes('<div') && !content.includes('<span')) {
                bubble.innerHTML = marked.parse(content);
            } else {
                bubble.innerHTML = content;
            }

            message.appendChild(avatar);
            message.appendChild(bubble);

            messagesDiv.appendChild(message);
            messagesDiv.parentElement.scrollTop = messagesDiv.parentElement.scrollHeight;
        }

        function removeLastMessage() {
            const messagesDiv = document.querySelector('.messages');
            if (messagesDiv && messagesDiv.lastChild) {
                messagesDiv.lastChild.remove();
            }
        }

        function getOrCreateMessagesDiv() {
            let messagesDiv = document.querySelector('.messages');
            if (!messagesDiv) {
                const wrapper = document.createElement('div');
                wrapper.className = 'messages';
                elements.messagesWrapper.innerHTML = '';
                elements.messagesWrapper.appendChild(wrapper);
                messagesDiv = wrapper;
            }
            return messagesDiv;
        }

        function updateHistory(question, answer) {
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            chatHistoryData.push({ question, answer, timestamp });

            if (elements.historyList.querySelector('.history-empty')) {
                elements.historyList.innerHTML = '';
            }

            const item = document.createElement('div');
            item.className = 'history-list-item';
            item.innerHTML = `
                <div class="history-question">${question.substring(0, 35)}${question.length > 35 ? '...' : ''}</div>
                <div class="history-time">${timestamp}</div>
            `;

            elements.historyList.appendChild(item);
            elements.historyCounter.textContent = chatHistoryData.length;
        }

        function addConversationToSidebar(sessionId, filename) {
            const sidebarHistory = document.getElementById('sidebarHistory');
            if (sidebarHistory.firstChild.classList.contains('history-empty')) {
                sidebarHistory.innerHTML = '';
            }

            const item = document.createElement('div');
            item.className = 'history-item active';
            item.textContent = filename;
            item.addEventListener('click', () => {
                document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });

            sidebarHistory.insertBefore(item, sidebarHistory.firstChild);
        }

        elements.newChatBtn.addEventListener('click', () => {
            currentSessionId = null;
            chatHistoryData = [];
            elements.pdfStatus.classList.remove('active');
            elements.questionInput.disabled = true;
            elements.sendButton.disabled = true;
            elements.questionInput.value = '';
            elements.historyList.innerHTML = '<div class="history-empty">No Q&A yet</div>';
            elements.historyCounter.textContent = '0';
            elements.messagesWrapper.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📚</div>
                    <div class="empty-state-text">AI Study Assistant</div>
                    <div class="empty-state-subtext">Upload a PDF to start asking questions</div>
                </div>
            `;
        });

        function showError(message) {
            if (message) {
                elements.errorMessage.textContent = message;
                elements.errorMessage.classList.add('show');
            } else {
                elements.errorMessage.classList.remove('show');
            }
        }

        console.log('🚀 AI Study Assistant loaded!');
    </script>
</body>
</html>
