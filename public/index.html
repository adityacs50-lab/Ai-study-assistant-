<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant - Chat with Your PDFs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-dark: #6d28d9;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Main content */
        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 1.2fr 2fr;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        /* Upload section */
        .upload-section {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background: var(--bg-hover);
        }

        .upload-section.dragging {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.1);
        }

        #fileInput {
            display: none;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .upload-text {
            text-align: center;
        }

        .upload-text h3 {
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .upload-text p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .upload-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .upload-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .upload-button:active {
            transform: translateY(0);
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--success);
            border-radius: 6px;
            text-align: center;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-info-name {
            font-weight: 600;
            color: var(--success);
            margin-bottom: 5px;
        }

        .file-info-meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Chat section */
        .chat-section {
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* History sidebar */
        .history-section {
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .history-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .history-header h3 {
            font-size: 1rem;
            margin: 0;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .history-empty {
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .history-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .history-item:hover {
            background: var(--bg-hover);
            border-left-color: var(--primary);
        }

        .history-item-question {
            font-size: 0.85rem;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .history-counter {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-left: 8px;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .chat-status {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .chat-status.active {
            color: var(--success);
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: rgba(124, 58, 237, 0.2);
        }

        .message.user .message-avatar {
            background: rgba(59, 130, 246, 0.2);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .message.assistant .message-content {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-left: 3px solid var(--primary);
        }

        .message.user .message-content {
            background: var(--primary);
            color: white;
        }

        .message-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 5px;
            text-align: right;
        }

        /* Markdown styling */
        .message.assistant .message-content p {
            margin: 6px 0;
        }

        .message.assistant .message-content strong {
            color: #c084fc;
        }

        .message.assistant .message-content ol,
        .message.assistant .message-content ul {
            padding-left: 20px;
            margin: 8px 0;
        }

        .message.assistant .message-content li {
            margin: 4px 0;
        }

        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3 {
            color: #a855f7;
            margin: 10px 0 6px 0;
        }

        .message.assistant .message-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .message.assistant .message-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Input section */
        .chat-input-section {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #questionInput {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        #questionInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        #questionInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-button:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .send-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Model selector */
        .model-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .model-selector label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        #modelSelect {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: border-color 0.3s ease;
        }

        #modelSelect:hover {
            border-color: var(--primary);
        }

        #modelSelect:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.1);
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-message {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Error message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--error);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8rem;
            }

            .message-content {
                max-width: 90%;
            }

            .container {
                height: auto;
            }
        }

        /* Scrollbar styling */
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 AI Study Assistant</h1>
            <p class="subtitle">Chat with your PDFs using Claude AI</p>
        </header>

        <div class="main-content">
            <!-- Upload Section -->
            <div class="upload-section" id="uploadSection">
                <div class="upload-icon">📄</div>
                <div class="upload-text">
                    <h3>Upload a PDF</h3>
                    <p>Click to select or drag your PDF here</p>
                    <button class="upload-button" id="uploadButton">Choose File</button>
                </div>
                <div class="file-info" id="fileInfo">
                    <div class="file-info-name" id="fileName"></div>
                    <div class="file-info-meta">
                        <span id="filePages"></span> • <span id="fileSize"></span>
                    </div>
                </div>
                <input type="file" id="fileInput" accept=".pdf" />
            </div>

            <!-- History Section -->
            <div class="history-section">
                <div class="history-header">
                    <h3>📋 History <span class="history-counter" id="historyCounter">0</span></h3>
                </div>
                <div class="history-list" id="historyList">
                    <div class="history-empty">
                        <p>No questions yet</p>
                    </div>
                </div>
            </div>

            <!-- Chat Section -->
            <div class="chat-section">
                <div class="chat-header">
                    <div>
                        <h3>💬 Chat</h3>
                        <div class="chat-status" id="chatStatus">Upload a PDF to start</div>
                    </div>
                    <div class="model-selector">
                        <label for="modelSelect">Model:</label>
                        <select id="modelSelect">
                            <option value="claude-opus-4-1">Opus 4.1 (Best)</option>
                            <option value="claude-sonnet-4-20250514">Sonnet 4 (Fast)</option>
                            <option value="claude-3-5-sonnet-20241022">Sonnet 3.5 (Balanced)</option>
                        </select>
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>

                <div class="messages" id="messages">
                    <div class="empty-state">
                        <div>
                            <div class="empty-state-icon">✨</div>
                            <p>Upload a PDF and ask questions to get started!</p>
                        </div>
                    </div>
                </div>

                <div class="chat-input-section">
                    <div class="input-group">
                        <input
                            type="text"
                            id="questionInput"
                            placeholder="Ask a question about your PDF..."
                            disabled
                        />
                        <button class="send-button" id="sendButton" disabled>
                            Send
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State management
        let currentSessionId = null;
        let isLoading = false;
        let chatHistoryData = [];

        const elements = {
            uploadSection: document.getElementById('uploadSection'),
            fileInput: document.getElementById('fileInput'),
            uploadButton: document.getElementById('uploadButton'),
            fileName: document.getElementById('fileName'),
            filePages: document.getElementById('filePages'),
            fileSize: document.getElementById('fileSize'),
            fileInfo: document.getElementById('fileInfo'),
            messages: document.getElementById('messages'),
            questionInput: document.getElementById('questionInput'),
            sendButton: document.getElementById('sendButton'),
            chatStatus: document.getElementById('chatStatus'),
            errorMessage: document.getElementById('errorMessage'),
            modelSelect: document.getElementById('modelSelect'),
            historyList: document.getElementById('historyList'),
            historyCounter: document.getElementById('historyCounter'),
        };

        // File upload handlers
        elements.uploadButton.addEventListener('click', () => elements.fileInput.click());

        elements.fileInput.addEventListener('change', handleFileSelect);

        // Drag and drop
        elements.uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            elements.uploadSection.classList.add('dragging');
        });

        elements.uploadSection.addEventListener('dragleave', () => {
            elements.uploadSection.classList.remove('dragging');
        });

        elements.uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            elements.uploadSection.classList.remove('dragging');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                elements.fileInput.files = files;
                handleFileSelect();
            }
        });

        // File upload handling
        async function handleFileSelect() {
            const file = elements.fileInput.files[0];
            if (!file) return;

            if (file.type !== 'application/pdf') {
                showError('Please upload a valid PDF file');
                return;
            }

            const formData = new FormData();
            formData.append('pdf', file);

            try {
                showError(''); // Clear errors
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                currentSessionId = data.sessionId;

                // Update UI
                elements.fileName.textContent = data.filename;
                elements.filePages.textContent = `${data.pages} pages`;
                elements.fileSize.textContent = `${(data.textLength / 1024).toFixed(1)} KB`;
                elements.fileInfo.classList.add('show');

                elements.chatStatus.textContent = `Loaded: ${data.filename} ✓`;
                elements.chatStatus.classList.add('active');

                elements.questionInput.disabled = false;
                elements.sendButton.disabled = false;

                // Reset history for new PDF
                chatHistoryData = [];
                elements.historyList.innerHTML = '<div class="history-empty"><p>No questions yet</p></div>';
                elements.historyCounter.textContent = '0';

                // Clear messages and show welcome
                elements.messages.innerHTML = `
                    <div class="empty-state">
                        <div>
                            <div class="empty-state-icon">👋</div>
                            <p>Great! Now ask me anything about "${data.filename}"</p>
                        </div>
                    </div>
                `;
            } catch (error) {
                showError(`Upload failed: ${error.message}`);
                console.error('Upload error:', error);
            }
        }

        // Question handling
        elements.sendButton.addEventListener('click', sendQuestion);
        elements.questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isLoading && currentSessionId) {
                sendQuestion();
            }
        });

        async function sendQuestion() {
            const question = elements.questionInput.value.trim();
            if (!question || isLoading || !currentSessionId) return;

            try {
                showError(''); // Clear errors
                isLoading = true;
                elements.sendButton.disabled = true;
                elements.questionInput.disabled = true;

                // Add user message
                addMessage('user', question);
                elements.questionInput.value = '';

                // Show loading message
                addMessage('assistant', '<div class="loading-message"><span>Thinking</span><span class="spinner"></span></div>');

                // Send to API
                const selectedModel = elements.modelSelect.value;
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId, question, model: selectedModel })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to get response');
                }

                // Remove loading message
                const lastMessage = elements.messages.lastElementChild;
                lastMessage.remove();

                // Add assistant response
                addMessage('assistant', data.answer);

                // Update history
                updateHistory(question, data.answer);
            } catch (error) {
                showError(`Error: ${error.message}`);
                const lastMessage = elements.messages.lastElementChild;
                lastMessage.remove();
                console.error('Question error:', error);
            } finally {
                isLoading = false;
                elements.sendButton.disabled = false;
                elements.questionInput.disabled = false;
                elements.questionInput.focus();
            }
        }

        // Update history display
        function updateHistory(question, answer) {
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            chatHistoryData.push({ question, answer, timestamp });

            if (elements.historyList.querySelector('.history-empty')) {
                elements.historyList.innerHTML = '';
            }

            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <div class="history-item-question">${question.substring(0, 50)}${question.length > 50 ? '...' : ''}</div>
                <div class="history-item-time">${timestamp}</div>
            `;

            historyItem.addEventListener('click', () => {
                const idx = chatHistoryData.indexOf(chatHistoryData.find(h => h.timestamp === timestamp && h.question === question));
                if (idx !== -1) {
                    // Highlight the item
                    document.querySelectorAll('.history-item').forEach(item => item.style.borderLeftColor = 'transparent');
                    historyItem.style.borderLeftColor = 'var(--primary)';
                }
            });

            elements.historyList.appendChild(historyItem);

            // Update counter
            elements.historyCounter.textContent = chatHistoryData.length;
        }

        // Helper functions
        function addMessage(role, content) {
            if (elements.messages.querySelector('.empty-state')) {
                elements.messages.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Parse markdown for assistant messages
            if (role === 'assistant' && !content.includes('<div') && !content.includes('<span')) {
                contentDiv.innerHTML = marked.parse(content);
            } else {
                contentDiv.innerHTML = content;
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);

            elements.messages.appendChild(messageDiv);
            elements.messages.scrollTop = elements.messages.scrollHeight;
        }

        function showError(message) {
            if (message) {
                elements.errorMessage.textContent = message;
                elements.errorMessage.classList.add('show');
            } else {
                elements.errorMessage.classList.remove('show');
            }
        }

        // Initialize
        console.log('🚀 AI Study Assistant loaded!');
    </script>
</body>
</html>
